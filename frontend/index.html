<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fica quanto?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="tokens.css">
    <script src="https://cdn.jsdelivr.net/npm/cleave.js@1.6.0/dist/cleave.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="theme-color" content="#383838" />
  </head>
  <body class="bg-[var(--color-background-100)] flex flex-col" style="min-height: 100vh; min-height: 100dvh;">

    <!-- Top section: title + ARS -->
    <header class="flex flex-col gap-6 items-center justify-end px-8 pt-8 pb-6" style="background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), url('src/currency-background.avif'); background-size: 300%; background-position: center; background-repeat: no-repeat;">
      <p class="text-[var(--color-content-secondary)] text-[14px] text-center w-full">Taxa de câmbio comercial</p>
      <label for="ARSamount" class="flex items-center justify-between w-full cursor-pointer">
        <div class="flex gap-2 items-center p-2 shrink-0">
          <img src="icons/flag-argentina.svg" alt="Argentina" class="w-10 h-8">
          <span class="text-[var(--color-content-secondary)] text-base font-semibold">ARS</span>
        </div>
        <input
          type="text"
          id="ARSamount"
          placeholder="0,00"
          inputmode="numeric"
          class="bg-transparent placeholder:text-[var(--color-content-tertiary)] text-[var(--color-content-tertiary)] text-[64px] font-extrabold text-right w-full outline-none leading-none"
        />
      </label>
    </header>

    <div class="relative px-4">
      <div class="absolute left-6 -top-5 z-10 inline-flex items-center gap-2 px-3 py-2.5 rounded-full bg-[var(--color-background-100)] text-[16px] text-[var(--color-content-primary)] font-bold">
        <span id="actualCurrency">Thinking...</span>
      </div>
    </div>

    <!-- Bottom section: BRL card + empty state -->
    <main class="flex flex-col flex-1 gap-10 px-4 py-2.5 overflow-hidden">
      <label for="BRLamount" class="bg-[var(--color-brand-secondary)] flex items-center justify-between px-4 py-6 rounded-[32px] w-full cursor-pointer">
        <div class="flex gap-2 items-center p-2 shrink-0">
          <img src="icons/flag-brazil.svg" alt="Brazil" class="w-10 h-8">
          <span class="text-[var(--color-content-secondary)] text-base font-semibold">BRL</span>
        </div>
        <input
          type="text"
          id="BRLamount"
          placeholder="0,00"
          inputmode="numeric"
          class="bg-transparent placeholder:text-[var(--color-content-tertiary)] text-[var(--color-content-tertiary)] text-[48px] font-extrabold text-right w-full outline-none leading-none"
        />
      </label>

      <button id="submitButton" class="py-5 bg-[var(--color-brand-primary)] w-full rounded-[24px] text-[16px] font-bold text-[var(--color-content-tertiary)] cursor-pointer hidden">Confirmar valor</button>

      <div class="flex flex-col flex-1 items-center pt-16 text-center">
        <p class="text-base text-[var(--color-content-primary)] font-bold">Sem gastos registrados</p>
        <p class="text-base text-[var(--color-content-primary)] mt-3">Nenhuma gasto ainda foi registrado</p>
      </div>
    </main>

    <script src="conversion.js"></script>
    <script src="actualCurrency.js"></script>
    <script>
      function goToRegister(e) {
        e.preventDefault()

        const ars = document.getElementById('ARSamount').value; 
        const brl = document.getElementById('BRLamount').value;
        window.location.href = `registerValue.html?ars=${encodeURIComponent(ars)}&brl=${encodeURIComponent(brl)}`;
      }
    </script>

  </body>
</html>
