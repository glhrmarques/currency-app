<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fica quanto?</title>
    <script src="https://cdn.jsdelivr.net/npm/cleave.js@1.6.0/dist/cleave.min.js"></script>
  </head>
  <body>
    <input
            type="text"
            id="ARSamount"
            placeholder="0"
            value="1"
            inputmode="numeric"
    />
    <input
            type="text"
            id="BRLamount"
            placeholder="0,00"
            inputmode="numeric"
    />

    <script>

        const ARSamount = document.querySelector("#ARSamount");
        const BRLamount = document.querySelector("#BRLamount");

        const cleaveARS = new Cleave('#ARSamount', {
            numeral: true,
            numeralThousandsGroupStyle: 'thousand',
            numeralDecimalMark: ',',
            delimiter: '.',
            numeralDecimalScale: 0,
            onValueChanged: function () {
              convertARS();
            }
        });

        async function convertARS() {
            const amount = parseFloat(cleaveARS.getRawValue());

            if (!amount || amount <= 0) {
                BRLamount.value = "";
                return;
            }

            try {
                const res = await fetch("/currencies/ars");
                const data = await res.json();
                const rate = data.ars.brl;

                const result = amount * rate;

                BRLamount.value = result.toLocaleString(undefined, {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                });
            } catch (error) {
                console.error(error);
            }
        }

        convertARS();

        // BRL to ARS

        const cleaveBRL = new Cleave('#BRLamount', {
            numeral: true,
            numeralThousandsGroupStyle: 'thousand',
            numeralDecimalMark: ',',
            delimiter: '.',
            numeralDecimalScale: 0,
            onValueChanged: function () {
                convertBRL();
            }
        });

        async function convertBRL() {
          const amount = parseFloat(cleaveBRL.getRawValue());

          if(!amount || amount <= 0) {
            ARSamount.value = "";
            return
          }

          try {

            const res = await fetch('/currencies/brl');
            const data = await res.json();
            const rate = data.brl.ars;

            const result = amount * rate; 

            ARSamount.value = result.toLocaleString(undefined, {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                });

          } catch(error) {
            console.error(error)
          }

        };

        convertBRL()

    </script>

  </body>
</html>
